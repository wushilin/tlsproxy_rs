<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>TLS Proxy Console</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/styles.css">
  <script type="module" src="/app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 4 5v6c0 5 3.4 7.9 7.7 9.4a1 1 0 0 0 .6 0C16.6 18.9 20 16 20 11V5l-8-3z"/>
            <path d="M9.5 11.5 11.5 13.5 15 10"/>
          </svg>
        </div>
        <div class="brand-text">
          <strong>TLS Proxy</strong>
          <span>Admin console</span>
        </div>
      </div>

      <nav aria-label="Primary">
        <button class="nav-item active" data-view="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          <span class="nav-label">Overview</span>
        </button>
        <button class="nav-item" data-view="listeners">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m8 3-4 4 4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/>
          </svg>
          <span class="nav-label">Listeners</span>
        </button>
        <button class="nav-item" data-view="dns">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/><path d="M3 12h18"/>
            <path d="M12 3a13.5 13.5 0 0 1 3.5 9 13.5 13.5 0 0 1-3.5 9 13.5 13.5 0 0 1-3.5-9A13.5 13.5 0 0 1 12 3z"/>
          </svg>
          <span class="nav-label">DNS overrides</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" title="Toggle color theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>
          </svg>
          <span class="nav-label">Theme</span>
        </button>
        <p class="sidebar-note nav-label">Self-contained UI, embedded in the proxy binary.</p>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div class="page-heading">
          <h1 id="page-title">Overview</h1>
          <p id="page-subtitle">Live status of the proxy service</p>
        </div>
        <div class="topbar-actions">
          <span class="dirty-badge" id="dirty-badge" hidden>Unsaved changes</span>
          <span class="status-pill neutral" id="manager-status" title="Proxy service status">Checking…</span>
          <button class="button" data-operation="start">Start</button>
          <button class="button outline-danger" data-operation="stop">Stop</button>
          <button class="button" data-operation="reset">Revert</button>
          <button class="button primary" data-operation="apply">Apply &amp; restart</button>
          <button class="button" id="reload-button" title="Reload configuration from the server">Reload</button>
          <button class="button primary" id="save-button" disabled>Save</button>
        </div>
      </header>

      <section id="content" class="content" aria-busy="true"></section>
    </main>
  </div>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <div class="loading-overlay" id="loading" hidden>
    <div class="spinner"></div>
    <span>Working…</span>
  </div>

  <dialog id="confirm-dialog">
    <form method="dialog">
      <h2 id="confirm-title">Are you sure?</h2>
      <p id="confirm-message"></p>
      <div class="dialog-actions">
        <button class="button ghost" value="cancel">Cancel</button>
        <button class="button danger" id="confirm-action" value="confirm">Continue</button>
      </div>
    </form>
  </dialog>

  <dialog id="listener-dialog" class="editor-dialog">
    <form id="listener-form">
      <header class="dialog-header">
        <h2 id="listener-dialog-title">Edit listener</h2>
      </header>
      <input type="hidden" id="listener-original-name">

      <div class="dialog-section">
        <h3>Endpoint</h3>
        <div class="form-grid">
          <div class="field">
            <label for="listener-name">Name</label>
            <input id="listener-name" required>
          </div>
          <div class="field">
            <label for="listener-bind">Bind address</label>
            <input id="listener-bind" placeholder="0.0.0.0:1443" required>
          </div>
          <div class="field">
            <label for="listener-target-port">Target port</label>
            <input id="listener-target-port" type="number" min="1" max="65535" required>
          </div>
          <div class="field">
            <label for="listener-mode">Mode</label>
            <select id="listener-mode">
              <option value="passthrough">TLS passthrough</option>
              <option value="terminate">TLS termination</option>
            </select>
          </div>
        </div>
        <div id="listener-upstream-section" class="terminate-options" hidden>
          <label class="switch-row" for="listener-upstream-tls">
            <input id="listener-upstream-tls" type="checkbox">
            <span>
              <strong>Upstream TLS</strong>
              <small>Encrypt proxy-to-upstream traffic without authenticating the upstream certificate.</small>
            </span>
          </label>
        </div>
      </div>

      <div class="dialog-section">
        <h3>Access control</h3>
        <div class="form-grid">
          <div class="field">
            <label for="listener-policy">Policy</label>
            <select id="listener-policy">
              <option value="DENY">DENY matching hosts</option>
              <option value="ALLOW">ALLOW only matching hosts</option>
            </select>
          </div>
          <div class="field"></div>
          <div class="field">
            <label for="listener-static-hosts">Static host rules</label>
            <textarea id="listener-static-hosts" placeholder="example.com"></textarea>
          </div>
          <div class="field">
            <label for="listener-patterns">Regex rules</label>
            <textarea id="listener-patterns" placeholder="^api\d+\.example\.com$"></textarea>
          </div>
        </div>
      </div>

      <div class="dialog-section">
        <h3>Limits</h3>
        <div class="form-grid">
          <div class="field">
            <label for="listener-idle-timeout">Idle timeout (ms)</label>
            <input id="listener-idle-timeout" type="number" min="0">
          </div>
          <div class="field">
            <label for="listener-speed-limit">Speed limit (bytes/sec)</label>
            <input id="listener-speed-limit" type="number" min="0" step="any">
          </div>
        </div>
      </div>

      <div class="dialog-actions">
        <button class="button ghost" type="button" id="listener-cancel">Cancel</button>
        <button class="button primary" type="submit">Save listener</button>
      </div>
    </form>
  </dialog>

  <dialog id="dns-dialog" class="editor-dialog compact-dialog">
    <form id="dns-form">
      <header class="dialog-header">
        <h2 id="dns-dialog-title">Edit DNS rule</h2>
      </header>
      <input type="hidden" id="dns-kind">
      <input type="hidden" id="dns-index">
      <div class="dialog-section">
        <div class="form-grid">
          <div class="field" id="dns-from-wrap">
            <label for="dns-from">Match</label>
            <input id="dns-from" placeholder="example.com:443">
          </div>
          <div class="field" id="dns-hostname-wrap">
            <label for="dns-hostname">Hostname pattern</label>
            <input id="dns-hostname" placeholder="^api\d+\.example\.com$">
          </div>
          <div class="field" id="dns-port-wrap">
            <label for="dns-port">Port</label>
            <input id="dns-port" type="number" min="1" max="65535" placeholder="any">
          </div>
          <div class="field">
            <label for="dns-to">Destination</label>
            <input id="dns-to" placeholder="127.0.0.1:443" required>
          </div>
        </div>
      </div>
      <div class="dialog-actions">
        <button class="button ghost" type="button" id="dns-cancel">Cancel</button>
        <button class="button primary" type="submit">Save rule</button>
      </div>
    </form>
  </dialog>

  <dialog id="active-dialog" class="editor-dialog">
    <form method="dialog">
      <header class="dialog-header">
        <h2 id="active-dialog-title">Active connections</h2>
      </header>
      <div class="dialog-section" id="active-dialog-body"></div>
      <div class="dialog-actions">
        <button class="button primary" value="close">Close</button>
      </div>
    </form>
  </dialog>
</body>
</html>
