<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TLS Proxy · Setup</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f6fb; --card: #ffffff; --ink: #172033; --muted: #5b6478;
      --line: #d9dfeb; --brand: #165dcc; --brand-ink: #ffffff; --ok: #1c7c4a; --danger: #c0392b;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0e1420; --card: #161d2b; --ink: #e7ecf5; --muted: #94a0b6; --line: #263042; --brand: #4d8bf0; --brand-ink: #0b1220; --ok: #4cc283; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh; display: grid; place-items: start center; padding: 2.5rem 1.5rem;
      background: radial-gradient(120% 90% at 50% 0%, color-mix(in srgb, var(--brand) 12%, var(--bg)) 0%, var(--bg) 55%);
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--ink);
    }
    main { width: 100%; max-width: 40rem; }
    .brand { display: flex; align-items: center; gap: .6rem; margin-bottom: 1.25rem; }
    .brand .mark { width: 2.1rem; height: 2.1rem; border-radius: 9px; background: var(--brand); color: var(--brand-ink); display: grid; place-items: center; font-weight: 700; }
    .brand h1 { font-size: 1.2rem; margin: 0; }
    .brand p { margin: 0; font-size: .82rem; color: var(--muted); }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 1.75rem; box-shadow: 0 18px 50px -30px rgba(12,22,44,.5); }
    .lede { margin: 0 0 1.5rem; font-size: .9rem; color: var(--muted); }
    form { display: grid; gap: 1.1rem; }
    label { display: grid; gap: .35rem; font-size: .85rem; color: var(--muted); }
    input, select {
      width: 100%; padding: .68rem .8rem; font-size: 1rem; color: var(--ink);
      background: color-mix(in srgb, var(--card) 92%, var(--bg)); border: 1px solid var(--line); border-radius: 10px;
    }
    input:focus, select:focus { outline: 2px solid color-mix(in srgb, var(--brand) 55%, transparent); outline-offset: 1px; border-color: var(--brand); }
    small { color: var(--muted); font-size: .78rem; }
    button { margin-top: .3rem; padding: .8rem; font-size: 1rem; font-weight: 600; cursor: pointer; color: var(--brand-ink); background: var(--brand); border: 0; border-radius: 10px; }
    button:hover { filter: brightness(1.05); }
    button:disabled { opacity: .6; cursor: default; }
    #result { white-space: pre-wrap; margin: 1rem 0 0; padding: .7rem .8rem; border-radius: 9px; font-size: .88rem; }
    #result:not(:empty) { background: color-mix(in srgb, var(--brand) 10%, transparent); }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <span class="mark">T</span>
      <div><h1>TLS Proxy</h1><p>Initial setup</p></div>
    </div>
    <div class="card">
  <p class="lede">Enter the one-time token printed by the service. This endpoint closes permanently after setup.</p>
  <form id="setup">
    <label>Setup token <input name="token" required autocomplete="off"></label>
    <label>Administrator <input name="username" required autocomplete="username"></label>
    <label>Password <input name="password" type="password" minlength="12" required autocomplete="new-password"></label>
    <label>Control hostname <input name="control_hostname" placeholder="tls.example.com" required></label>
    <label>Public IPs, comma separated <input name="self_ips" placeholder="203.0.113.10, 2001:db8::10"></label>
    <label>Public DNS resolvers, comma separated <input name="public_resolvers" value="1.1.1.1, 8.8.8.8" required><small>Used to verify that certificate hostnames resolve to this server. IPv4, IPv6, and optional ports are accepted.</small></label>
    <label>Initial ACME provider <select name="provider_id">
      <option value="letsencrypt-production">Let's Encrypt Production</option>
      <option value="letsencrypt-staging">Let's Encrypt Staging</option>
    </select></label>
    <button type="submit">Complete setup</button>
  </form>
  <p id="result" role="status"></p>
    </div>
  </main>
  <script>
    document.querySelector('#setup').addEventListener('submit', async event => {
      event.preventDefault();
      const values = new FormData(event.currentTarget);
      const body = Object.fromEntries(values);
      body.self_ips = body.self_ips.split(',').map(value => value.trim()).filter(Boolean);
      body.public_resolvers = body.public_resolvers.split(',').map(value => value.trim()).filter(Boolean);
      const response = await fetch('/tlsproxy_api/setup', {
        method: 'POST', headers: {'content-type': 'application/json'}, body: JSON.stringify(body)
      });
      const result = await response.json();
      document.querySelector('#result').textContent = result.message;
      if (result.success) event.currentTarget.querySelectorAll('input,button').forEach(item => item.disabled = true);
    });
  </script>
</body>
</html>
